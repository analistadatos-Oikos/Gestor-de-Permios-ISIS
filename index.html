<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ISIS API</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --blue: #0047ff; --dark: #001a4d; }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; width:100%; overflow:hidden; font-family:'Plus Jakarta Sans',sans-serif; background:#f0f4ff; }

  /* ── MENÚ ── */
  #menu {
    position:fixed; inset:0; z-index:200;
    display:flex;
    background:#f0f4ff;
    transition:opacity .4s ease, transform .4s ease;
  }
  #menu.hide { opacity:0; transform:scale(1.03); pointer-events:none; }

  /* lado izquierdo: card de acceso */
  .menu-left {
    width:460px; min-width:360px;
    background:#fff;
    display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
    padding:60px 64px;
    position:relative; z-index:2;
  }

  .menu-logo {
    display:flex; align-items:center; gap:12px; margin-bottom:44px;
  }
  .menu-logo-icon {
    background:var(--blue); width:40px; height:40px; border-radius:10px;
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:17px;
  }
  .menu-logo span { font-weight:900; font-size:20px; color:var(--dark); letter-spacing:-.5px; }

  .menu-headline { font-size:26px; font-weight:800; color:var(--dark); margin-bottom:8px; line-height:1.2; }
  .menu-sub { font-size:13px; color:#64748b; font-weight:500; line-height:1.6; margin-bottom:36px; }

  /* tarjetas de perfil */
  .profile-cards { display:flex; flex-direction:column; gap:12px; width:100%; }

  .profile-card {
    display:flex; align-items:center; gap:16px;
    padding:18px 20px; border-radius:14px; cursor:pointer;
    border:1.5px solid #e2e8f0; background:#f8fafc;
    transition:all .2s ease; text-decoration:none; color:inherit;
  }
  .profile-card:hover { border-color:var(--blue); background:#fff; box-shadow:0 6px 20px rgba(0,71,255,.1); transform:translateX(4px); }

  .profile-card-icon {
    width:44px; height:44px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0;
  }
  .profile-card-icon.admin { background:#eff6ff; color:var(--blue); }
  .profile-card-icon.user  { background:#f0fdf4; color:#10b981; }

  .profile-card-info { flex:1; }
  .profile-card-title { font-size:14px; font-weight:800; color:var(--dark); margin-bottom:2px; }
  .profile-card-desc  { font-size:11px; font-weight:600; color:#94a3b8; }

  .profile-card-arrow { color:#cbd5e1; font-size:13px; transition:color .2s, transform .2s; }
  .profile-card:hover .profile-card-arrow { color:var(--blue); transform:translateX(3px); }

  /* lado derecho: fondo animado igual al script admin */
  .menu-right {
    flex:1; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, #001a4d 0%, #0047ff 60%, #0ea5e9 100%);
  }
  #dot-canvas { position:absolute; inset:0; width:100%; height:100%; }

  .deco-card {
    position:relative; z-index:2;
    background:rgba(255,255,255,.08); backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:28px; padding:40px 45px; text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.35); min-width:230px;
  }
  .deco-card-icon { font-size:44px; color:#fff; margin-bottom:16px; }
  .deco-card-title { font-size:22px; font-weight:900; color:#fff; margin:0 0 6px; }
  .deco-card-sub { font-size:11px; color:rgba(255,255,255,.6); font-weight:600; text-transform:uppercase; letter-spacing:1.2px; }
  .deco-pill {
    display:inline-flex; align-items:center; gap:7px; margin-top:22px;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
    border-radius:30px; padding:8px 18px; font-size:11px; color:rgba(255,255,255,.85); font-weight:700;
  }
  .deco-pill-dot { width:8px; height:8px; border-radius:50%; background:#4ade80; animation:blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

  @media(max-width:700px) {
    .menu-right { display:none; }
    .menu-left  { width:100%; padding:48px 28px; }
  }

  /* ── IFRAME ── */
  #app {
    position:fixed; inset:0; z-index:50;
    border:none; width:100%; height:100%;
    opacity:0; pointer-events:none;
    transition:opacity .4s ease;
  }
  #app.show { opacity:1; pointer-events:all; }

  /* ── TOGGLE FLOTANTE ── */
  #toggle {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:9999;
    background:#fff; border-radius:100px; padding:4px;
    box-shadow:0 4px 24px rgba(0,71,255,.18);
    border:1.5px solid rgba(0,71,255,.12);
    display:none; gap:0;
    align-items:center;
  }
  #toggle.visible { display:flex; }

  .toggle-btn {
    display:flex; align-items:center; gap:7px;
    padding:9px 20px; border-radius:100px; border:none;
    background:transparent; font-family:inherit;
    font-size:12px; font-weight:800; color:#7a90b0; cursor:pointer;
    transition:all .22s ease; white-space:nowrap;
  }
  .toggle-btn i { font-size:12px; }
  .toggle-btn.active { background:var(--blue); color:#fff; box-shadow:0 3px 12px rgba(0,71,255,.35); }

  /* botón volver */
  #back {
    position:fixed; top:14px; left:14px; z-index:9999;
    display:none; align-items:center; gap:7px;
    background:#fff; border:1.5px solid rgba(0,71,255,.15);
    border-radius:10px; padding:8px 14px;
    font-family:inherit; font-size:12px; font-weight:800;
    color:var(--blue); cursor:pointer;
    box-shadow:0 2px 10px rgba(0,71,255,.1);
    transition:all .2s ease;
  }
  #back.visible { display:flex; }
  #back:hover { background:var(--blue); color:#fff; }
</style>
</head>
<body>

<!-- ── MENÚ PRINCIPAL ── -->
<div id="menu">
  <div class="menu-left">
    <div class="menu-logo">
      <div class="menu-logo-icon"><i class="fa-solid fa-eye"></i></div>
      <span>ISIS API</span>
    </div>

    <h1 class="menu-headline">Selecciona tu<br>tipo de acceso</h1>
    <p class="menu-sub">Elige el perfil que corresponde a tu rol<br>dentro del sistema ISIS para continuar.</p>

    <div class="profile-cards">
      <!-- ADMIN -->
      <div class="profile-card" onclick="entrar('admin')">
        <div class="profile-card-icon admin">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div class="profile-card-info">
          <div class="profile-card-title">Administrador</div>
          <div class="profile-card-desc">Acceso completo · Token requerido</div>
        </div>
        <i class="fa-solid fa-chevron-right profile-card-arrow"></i>
      </div>

      <!-- USUARIO -->
      <div class="profile-card" onclick="entrar('user')">
        <div class="profile-card-icon user">
          <i class="fa-solid fa-circle-user"></i>
        </div>
        <div class="profile-card-info">
          <div class="profile-card-title">Usuario</div>
          <div class="profile-card-desc">Verificación de correo · Acceso estándar</div>
        </div>
        <i class="fa-solid fa-chevron-right profile-card-arrow"></i>
      </div>
    </div>
  </div>

  <div class="menu-right">
    <canvas id="dot-canvas"></canvas>
    <div class="deco-card">
      <div class="deco-card-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <div class="deco-card-title">ISIS API</div>
      <div class="deco-card-sub">Security Management Gateway</div>
      <div class="deco-pill">
        <span class="deco-pill-dot"></span> Sistema Activo
      </div>
    </div>
  </div>
</div>

<!-- ── IFRAME ── -->
<iframe id="app" allow="camera; microphone; geolocation"></iframe>

<!-- ── BOTÓN VOLVER ── -->
<button id="back" onclick="volver()">
  <i class="fa-solid fa-arrow-left"></i> Cambiar perfil
</button>

<!-- ── TOGGLE FLOTANTE (visible sólo dentro del iframe) ── -->
<div id="toggle">
  <button class="toggle-btn active" id="btn-admin" onclick="cambiar('admin')">
    <i class="fa-solid fa-shield-halved"></i> Admin
  </button>
  <button class="toggle-btn" id="btn-user" onclick="cambiar('user')">
    <i class="fa-solid fa-circle-user"></i> Usuario
  </button>
</div>

<script>
  const URLS = {
    admin: 'https://script.google.com/macros/s/AKfycbxz7psCJDD8hurA7U_CJ6ifWRpMTuhxzoNveWshkMmN0sHLIc9C9qXsvlvJRqq61MtF/exec',
    user:  'https://script.google.com/macros/s/AKfycbz9B_2CVhFTrv7ONBqJN8esYpFw8m9pxGuemNm8XAfVi80ZBQnZCvHfjqqaD6hX0fdjgw/exec'
  };

  let current = null;
  const menu   = document.getElementById('menu');
  const app    = document.getElementById('app');
  const toggle = document.getElementById('toggle');
  const back   = document.getElementById('back');

  function entrar(mode) {
    current = mode;
    menu.classList.add('hide');
    app.src = URLS[mode];
    app.onload = () => { app.classList.add('show'); };
    setTimeout(() => {
      toggle.classList.add('visible');
      back.classList.add('visible');
      document.getElementById('btn-admin').classList.toggle('active', mode === 'admin');
      document.getElementById('btn-user').classList.toggle('active',  mode === 'user');
    }, 500);
  }

  function cambiar(mode) {
    if (mode === current) return;
    current = mode;
    app.classList.remove('show');
    document.getElementById('btn-admin').classList.toggle('active', mode === 'admin');
    document.getElementById('btn-user').classList.toggle('active',  mode === 'user');
    setTimeout(() => {
      app.src = URLS[mode];
      app.onload = () => setTimeout(() => app.classList.add('show'), 200);
    }, 300);
  }

  function volver() {
    app.classList.remove('show');
    toggle.classList.remove('visible');
    back.classList.remove('visible');
    setTimeout(() => {
      app.src = '';
      current = null;
      menu.classList.remove('hide');
    }, 400);
  }
</script>

<!-- canvas animado fondo derecho -->
<script>
(function(){
  const canvas = document.getElementById('dot-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const SPACING = 28;
  let cols, rows, dots = [];
  let mouse = {x:-9999, y:-9999};
  let time = 0;
  const panel = canvas.parentElement;
  panel.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
  });
  panel.addEventListener('mouseleave', () => { mouse.x=-9999; mouse.y=-9999; });
  function resize(){
    canvas.width = panel.offsetWidth; canvas.height = panel.offsetHeight;
    cols = Math.ceil(canvas.width/SPACING)+1; rows = Math.ceil(canvas.height/SPACING)+1;
    dots = [];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) dots.push({ox:c*SPACING, oy:r*SPACING});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height); time+=.018;
    for(let i=0;i<dots.length;i++){
      const d = dots[i];
      const wave = Math.sin(d.ox*.06*.18 + d.oy*.04*.18 + time*.9)*6;
      let x=d.ox+wave, y=d.oy+wave*.5;
      const dx=x-mouse.x, dy=y-mouse.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){ const f=(1-dist/120)*40; x+=(dx/dist)*f; y+=(dy/dist)*f; }
      const prox=Math.max(0,1-dist/120);
      const alpha=.18+.12*Math.sin(d.ox*.04+d.oy*.03+time*.7)+prox*.7;
      const rad=1.6+prox*3.5;
      ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2);
      ctx.fillStyle=`rgba(${Math.round(180+prox*75)},${Math.round(200+prox*55)},255,${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize); resize(); draw();
})();
</script>
</body>
</html>
