<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ISIS API</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --blue:#0047ff; --dark:#001a4d; }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; width:100%; overflow:hidden; font-family:'Plus Jakarta Sans',sans-serif; background:#f0f4ff; }

  /* ══ MENÚ ══════════════════════════════════ */
  #menu {
    position:fixed; inset:0; z-index:200;
    display:flex;
    transition:opacity .4s ease, transform .4s ease;
  }
  #menu.hide { opacity:0; transform:scale(1.02); pointer-events:none; }

  .menu-left {
    width:420px; min-width:340px; background:#fff;
    display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
    padding:56px 60px; position:relative; z-index:2;
  }

  /* robot SVG logo */
  .menu-logo { display:flex; align-items:center; gap:14px; margin-bottom:40px; }
  .menu-logo span { font-weight:900; font-size:20px; color:var(--dark); letter-spacing:-.5px; }

  .menu-headline { font-size:26px; font-weight:800; color:var(--dark); margin-bottom:8px; line-height:1.2; }
  .menu-sub { font-size:13px; color:#64748b; font-weight:500; line-height:1.6; margin-bottom:32px; }

  .profile-cards { display:flex; flex-direction:column; gap:10px; width:100%; }
  .profile-card {
    display:flex; align-items:center; gap:14px;
    padding:16px 18px; border-radius:12px; cursor:pointer;
    border:1.5px solid #e2e8f0; background:#f8fafc;
    transition:all .2s ease;
  }
  .profile-card:hover {
    border-color:var(--blue); background:#fff;
    box-shadow:0 6px 20px rgba(0,71,255,.1); transform:translateX(4px);
  }
  .profile-card-icon {
    width:42px; height:42px; border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;
  }
  .profile-card-icon.admin { background:#eff6ff; color:var(--blue); }
  .profile-card-icon.user  { background:#f0fdf4; color:#10b981; }
  .profile-card-info { flex:1; }
  .profile-card-title { font-size:14px; font-weight:800; color:var(--dark); margin-bottom:2px; }
  .profile-card-desc  { font-size:11px; font-weight:600; color:#94a3b8; }
  .profile-card-arrow { color:#cbd5e1; font-size:12px; transition:color .2s, transform .2s; }
  .profile-card:hover .profile-card-arrow { color:var(--blue); transform:translateX(3px); }

  /* panel azul */
  .menu-right {
    flex:1; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#001a4d 0%,#0047ff 60%,#0ea5e9 100%);
  }
  #dot-canvas { position:absolute; inset:0; width:100%; height:100%; }
  .deco-card {
    position:relative; z-index:2;
    background:rgba(255,255,255,.08); backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.18); border-radius:28px;
    padding:40px 45px; text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.35); min-width:230px;
  }
  .deco-card-icon { font-size:44px; color:#fff; margin-bottom:16px; }
  .deco-card-title { font-size:22px; font-weight:900; color:#fff; margin:0 0 6px; }
  .deco-card-sub { font-size:11px; color:rgba(255,255,255,.6); font-weight:600; text-transform:uppercase; letter-spacing:1.2px; }
  .deco-pill {
    display:inline-flex; align-items:center; gap:7px; margin-top:22px;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
    border-radius:30px; padding:8px 18px; font-size:11px; color:rgba(255,255,255,.85); font-weight:700;
  }
  .deco-pill-dot { width:8px; height:8px; border-radius:50%; background:#4ade80; animation:blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

  @media(max-width:680px){ .menu-right{display:none;} .menu-left{width:100%;padding:44px 28px;} }

  /* ══ LOADER silencioso ══════════════════════ */
  #loader {
    position:fixed; inset:0; z-index:150;
    background:rgba(240,244,255,.92); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  #loader.show { opacity:1; pointer-events:all; }
  .loader-ring {
    width:42px; height:42px; border-radius:50%;
    border:3px solid #dbeafe;
    border-top-color:var(--blue);
    animation:spin .7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ══ IFRAME ═════════════════════════════════ */
  #app {
    position:fixed; inset:0; z-index:100;
    border:none; width:100%; height:100%;
    opacity:0; pointer-events:none;
    transition:opacity .35s ease;
  }
  #app.show { opacity:1; pointer-events:all; }
  #app.with-bar { top:54px; height:calc(100% - 54px); }

  /* ══ TOPBAR glass ════════════════════════════ */
  #topbar {
    position:fixed; top:0; left:0; right:0; z-index:9999;
    height:54px;
    /* glass sobre el iframe */
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);
    border-bottom:1px solid rgba(255,255,255,0.5);
    box-shadow:0 1px 16px rgba(0,29,100,.08);
    display:none; align-items:center; justify-content:space-between;
    padding:0 20px;
  }
  #topbar.visible { display:flex; }

  /* robot pequeño en topbar */
  .topbar-brand { display:flex; align-items:center; gap:10px; }
  .topbar-brand-name { font-weight:900; font-size:15px; color:var(--dark); letter-spacing:-.3px; }

  /* toggle pill glass */
  .topbar-toggle {
    display:flex;
    background:rgba(0,29,100,.06);
    border:1px solid rgba(0,71,255,.12);
    border-radius:100px; padding:3px; gap:0;
  }
  .ttoggle-btn {
    display:flex; align-items:center; gap:6px;
    padding:7px 18px; border-radius:100px; border:none;
    background:transparent; font-family:inherit;
    font-size:12px; font-weight:800; color:rgba(0,26,77,.45); cursor:pointer;
    transition:all .22s ease; white-space:nowrap;
  }
  .ttoggle-btn i { font-size:11px; }
  .ttoggle-btn.active {
    background:var(--blue); color:#fff;
    box-shadow:0 3px 12px rgba(0,71,255,.35);
  }

  /* botón volver glass */
  .topbar-back {
    display:flex; align-items:center; gap:7px;
    background:rgba(255,255,255,0.6);
    border:1.5px solid rgba(0,71,255,.15);
    border-radius:9px; padding:7px 14px;
    font-family:inherit; font-size:12px; font-weight:800;
    color:rgba(0,26,77,.6); cursor:pointer;
    transition:all .2s ease;
    backdrop-filter:blur(8px);
  }
  .topbar-back:hover { background:rgba(0,71,255,.08); color:var(--blue); border-color:var(--blue); }
</style>
</head>
<body>

<!-- ══ MENÚ ══ -->
<div id="menu">
  <div class="menu-left">

    <div class="menu-logo">
      <!-- Robot ISIS SVG compacto -->
      <svg width="40" height="52" viewBox="0 0 148 192" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="69" y="2" width="10" height="18" rx="5" fill="#93c5fd"/>
        <circle cx="74" cy="2" r="6" fill="#0047ff"/>
        <circle cx="74" cy="2" r="2.5" fill="white" fill-opacity=".7"/>
        <rect x="18" y="18" width="112" height="74" rx="16" fill="white" stroke="#dbeafe" stroke-width="2.5"/>
        <rect x="18" y="18" width="112" height="22" rx="16" fill="#eff6ff"/>
        <rect x="18" y="32" width="112" height="8" fill="#eff6ff"/>
        <rect x="27" y="28" width="94" height="52" rx="10" fill="#0f172a"/>
        <rect x="36" y="38" width="28" height="26" rx="7" fill="#0047ff"/>
        <rect x="41" y="43" width="18" height="16" rx="5" fill="#60a5fa"/>
        <circle cx="44" cy="46" r="4" fill="white" fill-opacity=".9"/>
        <rect x="84" y="38" width="28" height="26" rx="7" fill="#0047ff"/>
        <rect x="89" y="43" width="18" height="16" rx="5" fill="#60a5fa"/>
        <circle cx="92" cy="46" r="4" fill="white" fill-opacity=".9"/>
        <path d="M54 68 Q74 80, 94 68" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" fill="none"/>
        <rect x="58" y="91" width="32" height="10" rx="5" fill="#dbeafe"/>
        <rect x="24" y="99" width="100" height="68" rx="14" fill="white" stroke="#dbeafe" stroke-width="2.5"/>
        <rect x="38" y="112" width="72" height="42" rx="9" fill="#f8faff" stroke="#dbeafe" stroke-width="1.5"/>
        <circle cx="57" cy="126" r="5.5" fill="#0047ff"/>
        <circle cx="74" cy="126" r="5.5" fill="#3b82f6"/>
        <circle cx="91" cy="126" r="5.5" fill="#93c5fd"/>
      </svg>
      <span>ISIS API</span>
    </div>

    <h1 class="menu-headline">Acceso Seguro<br>al Gateway</h1>
    <p class="menu-sub">Selecciona tu perfil para continuar<br>dentro del ecosistema ISIS.</p>

    <div class="profile-cards">
      <div class="profile-card" onclick="entrar('admin')">
        <div class="profile-card-icon admin"><i class="fa-solid fa-shield-halved"></i></div>
        <div class="profile-card-info">
          <div class="profile-card-title">Administrador</div>
          <div class="profile-card-desc">Acceso completo · Token requerido</div>
        </div>
        <i class="fa-solid fa-chevron-right profile-card-arrow"></i>
      </div>
      <div class="profile-card" onclick="entrar('user')">
        <div class="profile-card-icon user"><i class="fa-solid fa-circle-user"></i></div>
        <div class="profile-card-info">
          <div class="profile-card-title">Usuario</div>
          <div class="profile-card-desc">Verificación de correo · Acceso estándar</div>
        </div>
        <i class="fa-solid fa-chevron-right profile-card-arrow"></i>
      </div>
    </div>

  </div>

  <div class="menu-right">
    <canvas id="dot-canvas"></canvas>
    <div class="deco-card">
      <div class="deco-card-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <div class="deco-card-title">ISIS API</div>
      <div class="deco-card-sub">Security Management Gateway</div>
      <div class="deco-pill"><span class="deco-pill-dot"></span> Sistema Activo</div>
    </div>
  </div>
</div>

<!-- ══ LOADER ══ -->
<div id="loader"><div class="loader-ring"></div></div>

<!-- ══ TOPBAR glass ══ -->
<div id="topbar">
  <div class="topbar-brand">
    <!-- Robot mini en topbar -->
    <svg width="24" height="31" viewBox="0 0 148 192" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="69" y="2" width="10" height="18" rx="5" fill="#93c5fd"/>
      <circle cx="74" cy="2" r="6" fill="#0047ff"/>
      <circle cx="74" cy="2" r="2.5" fill="white" fill-opacity=".7"/>
      <rect x="18" y="18" width="112" height="74" rx="16" fill="white" stroke="#dbeafe" stroke-width="2.5"/>
      <rect x="27" y="28" width="94" height="52" rx="10" fill="#0f172a"/>
      <rect x="36" y="38" width="28" height="26" rx="7" fill="#0047ff"/>
      <rect x="41" y="43" width="18" height="16" rx="5" fill="#60a5fa"/>
      <circle cx="44" cy="46" r="4" fill="white" fill-opacity=".9"/>
      <rect x="84" y="38" width="28" height="26" rx="7" fill="#0047ff"/>
      <rect x="89" y="43" width="18" height="16" rx="5" fill="#60a5fa"/>
      <circle cx="92" cy="46" r="4" fill="white" fill-opacity=".9"/>
      <path d="M54 68 Q74 80, 94 68" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" fill="none"/>
      <rect x="24" y="99" width="100" height="68" rx="14" fill="white" stroke="#dbeafe" stroke-width="2.5"/>
      <rect x="38" y="112" width="72" height="42" rx="9" fill="#f8faff" stroke="#dbeafe" stroke-width="1.5"/>
      <circle cx="57" cy="126" r="5.5" fill="#0047ff"/>
      <circle cx="74" cy="126" r="5.5" fill="#3b82f6"/>
      <circle cx="91" cy="126" r="5.5" fill="#93c5fd"/>
    </svg>
    <span class="topbar-brand-name">ISIS API</span>
  </div>

  <div class="topbar-toggle">
    <button class="ttoggle-btn" id="btn-admin" onclick="cambiar('admin')">
      <i class="fa-solid fa-shield-halved"></i> Admin
    </button>
    <button class="ttoggle-btn" id="btn-user" onclick="cambiar('user')">
      <i class="fa-solid fa-circle-user"></i> Usuario
    </button>
  </div>

  <button class="topbar-back" onclick="volver()">
    <i class="fa-solid fa-arrow-left"></i> Cambiar perfil
  </button>
</div>

<!-- ══ IFRAME ══ -->
<iframe id="app" allow="camera; microphone; geolocation"></iframe>

<script>
  const URLS = {
    admin: 'https://script.google.com/macros/s/AKfycbxz7psCJDD8hurA7U_CJ6ifWRpMTuhxzoNveWshkMmN0sHLIc9C9qXsvlvJRqq61MtF/exec',
    user:  'https://script.google.com/macros/s/AKfycbz9B_2CVhFTrv7ONBqJN8esYpFw8m9pxGuemNm8XAfVi80ZBQnZCvHfjqqaD6hX0fdjgw/exec'
  };

  let current = null;
  let loadTimer = null;
  let loadCount = 0;

  const menu   = document.getElementById('menu');
  const app    = document.getElementById('app');
  const loader = document.getElementById('loader');
  const topbar = document.getElementById('topbar');

  const showLoader = () => loader.classList.add('show');
  const hideLoader = () => loader.classList.remove('show');

  function setActive(mode) {
    document.getElementById('btn-admin').classList.toggle('active', mode === 'admin');
    document.getElementById('btn-user').classList.toggle('active',  mode === 'user');
  }

  function onFrameReady() {
    clearTimeout(loadTimer);
    hideLoader();
    app.classList.add('show');
  }

  function entrar(mode) {
    current = mode;
    loadCount = 0;
    menu.classList.add('hide');
    showLoader();

    app.classList.remove('show');
    app.classList.add('with-bar');
    app.src = URLS[mode];

    app.onload = () => {
      loadCount++;
      if (loadCount === 1) {
        // primera carga: mostrar
        onFrameReady();
        topbar.classList.add('visible');
        setActive(mode);
      } else {
        // recarga posterior (usuario dio Salir) → recargar silencioso
        app.classList.remove('show');
        showLoader();
        setTimeout(() => {
          app.src = URLS[current];
          loadCount = 0;
        }, 400);
      }
    };

    loadTimer = setTimeout(() => { onFrameReady(); topbar.classList.add('visible'); setActive(mode); }, 6000);
  }

  function cambiar(mode) {
    if (mode === current) return;
    current = mode;
    loadCount = 0;
    setActive(mode);
    app.classList.remove('show');
    showLoader();

    setTimeout(() => {
      app.src = URLS[mode];
      app.onload = () => {
        loadCount++;
        if (loadCount === 1) {
          onFrameReady();
        } else {
          app.classList.remove('show');
          showLoader();
          setTimeout(() => { app.src = URLS[current]; loadCount = 0; }, 400);
        }
      };
      clearTimeout(loadTimer);
      loadTimer = setTimeout(onFrameReady, 6000);
    }, 300);
  }

  function volver() {
    app.classList.remove('show');
    app.classList.remove('with-bar');
    topbar.classList.remove('visible');
    clearTimeout(loadTimer);
    hideLoader();
    setTimeout(() => {
      app.src = '';
      current = null;
      loadCount = 0;
      menu.classList.remove('hide');
    }, 350);
  }
</script>

<!-- canvas animado -->
<script>
(function(){
  const canvas = document.getElementById('dot-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const SPACING = 28;
  let dots = [], mouse = {x:-9999,y:-9999}, time = 0;
  const panel = canvas.parentElement;
  panel.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
  });
  panel.addEventListener('mouseleave', () => { mouse.x=-9999; mouse.y=-9999; });
  function resize(){
    canvas.width = panel.offsetWidth; canvas.height = panel.offsetHeight;
    const cols=Math.ceil(canvas.width/SPACING)+1, rows=Math.ceil(canvas.height/SPACING)+1;
    dots=[];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) dots.push({ox:c*SPACING,oy:r*SPACING});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height); time+=.018;
    dots.forEach(d=>{
      const wave=Math.sin(d.ox*.011+d.oy*.007+time*.9)*6;
      let x=d.ox+wave, y=d.oy+wave*.5;
      const dx=x-mouse.x, dy=y-mouse.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){ const f=(1-dist/120)*40; x+=(dx/dist)*f; y+=(dy/dist)*f; }
      const prox=Math.max(0,1-dist/120);
      const alpha=.18+.12*Math.sin(d.ox*.04+d.oy*.03+time*.7)+prox*.7;
      ctx.beginPath(); ctx.arc(x,y,1.6+prox*3.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${Math.round(180+prox*75)},${Math.round(200+prox*55)},255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize); resize(); draw();
})();
</script>
</body>
</html>
